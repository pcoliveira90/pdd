name: "Feature request"
description: "Propose a focused feature aligned with PDD principles."
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the smallest valuable feature increment.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short feature title.
      placeholder: "Add JSON output to pdd status"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the minimal safe extension.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and non-goals
      description: What is included and explicitly out-of-scope?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: How should this be tested or verified?
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched for existing issues.
          required: true
        - label: I described a minimal scope.
          required: true
