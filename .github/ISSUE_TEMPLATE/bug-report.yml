name: "Bug report"
description: "Report a defect with clear reproduction and impact details."
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this bug.
        Please provide evidence and keep scope focused.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug.
      placeholder: "Login form does not persist income status"
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What is happening now?
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, stack traces, and other signals.
    validations:
      required: false
  - type: textarea
    id: risks
    attributes:
      label: Risks and impact
      description: What can break if this is not fixed or if fixed incorrectly?
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched for existing issues.
          required: true
        - label: I provided reproducible steps.
          required: true
