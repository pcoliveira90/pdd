name: CLI Self Validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  cli-self-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Pack CLI
        run: npm pack

      - name: Install packed CLI globally
        run: |
          PACKAGE_FILE=$(ls -1 *.tgz | head -n 1)
          npm install -g "$PACKAGE_FILE"

      - name: Validate CLI help
        run: pdd help

      - name: Validate CLI in isolated project
        run: |
          mkdir -p /tmp/pdd-e2e
          cd /tmp/pdd-e2e
          pdd init --here
          pdd doctor
          pdd fix "test resilient workflow" --dry-run
